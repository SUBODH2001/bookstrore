<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details - MyStore</title>
    <link rel="stylesheet" href="css/style.css">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Modern Bookstore</title>
        
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
        
        <link rel="stylesheet" href="css/style.css">
    </head>
    <style>
        .details-container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .split-view { display: flex; gap: 40px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); flex-wrap: wrap; }
        .book-cover-large { flex: 1; min-width: 250px; background: #f8f9fa; display: flex; align-items: center; justify-content: center; font-size: 5rem; border-radius: 8px; min-height: 350px; border: 1px solid #eee; }
        .book-info { flex: 2; min-width: 300px; }
        .book-title { font-size: 2.2rem; color: #111; margin-bottom: 5px; margin-top: 0; }
        .book-author { font-size: 1.1rem; color: #0070ba; margin-bottom: 20px; }
        .book-price-large { font-size: 2rem; color: #B12704; font-weight: bold; margin: 15px 0; }
        .synopsis { color: #333; line-height: 1.6; margin-bottom: 30px; }
        
        .reviews-section { margin-top: 40px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .review-card { border-bottom: 1px solid #eee; padding: 20px 0; }
        .review-card:last-child { border-bottom: none; }
        .review-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .reviewer-name { font-weight: bold; color: #111; }
        .review-date { color: #888; font-size: 0.9rem; }
    </style>
</head>
<body style="background-color: #f4f7f6;">

    <header>
        <div class="header-left">
            <a href="index.html" class="logo">📚 MyStore</a>
            <nav class="nav-links">
                <a href="index.html">← Back to Store</a>
            </nav>
        </div>
    </header>

    <div class="details-container">
        <div class="split-view" id="bookDetailsArea">
            <h3 style="text-align:center; width: 100%;">Loading book details...</h3>
        </div>

        <div class="reviews-section">
            <h2 style="margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px;">Customer Reviews</h2>
            <div id="reviewsList">
                <p style="color: #666;">Loading reviews...</p>
            </div>
        </div>
    </div>
</div> </div> <div id="toast"></div>
    <script src="js/telemetry.js"></script>
    <script src="js/book.js"></script>
</body>
</html>
