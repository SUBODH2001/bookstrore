<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MyStore</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .admin-container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        
        /* Summary Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid #0070ba; }
        .stat-card h3 { margin: 0; color: #666; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .value { font-size: 2.5rem; font-weight: bold; color: #111; margin: 10px 0 0 0; }
        
        /* Charts Area */
        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 40px; }
        .chart-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body style="background-color: #f4f7f6;">

    <header>
        <div class="header-left">
            <a href="index.html" class="logo">📚 MyStore Admin</a>
            <nav class="nav-links">
                <a href="index.html">← Back to Store</a>
            </nav>
        </div>
    </header>

    <div class="admin-container">
        <h1 style="color: #232f3e; margin-bottom: 30px;">📊 Executive Dashboard</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Revenue</h3>
                <p class="value" id="statRevenue">$0.00</p>
            </div>
            <div class="stat-card" style="border-left-color: #ffc107;">
                <h3>Total Orders</h3>
                <p class="value" id="statOrders">0</p>
            </div>
            <div class="stat-card" style="border-left-color: #28a745;">
                <h3>Registered Users</h3>
                <p class="value" id="statUsers">0</p>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container">
                <h3 style="margin-top: 0; color: #333;">Top 5 Selling Books</h3>
                <canvas id="barChart"></canvas>
            </div>
            <div class="chart-container">
                <h3 style="margin-top: 0; color: #333;">Sales by Category</h3>
                <canvas id="doughnutChart"></canvas>
            </div>
        </div>

    </div>

    <script>
        window.onload = function() {
            const token = localStorage.getItem("session_token");
            if (!token) {
                alert("You must be logged in to view analytics.");
                window.location.href = "index.html";
                return;
            }
            fetchAnalytics(token);
        };

        function fetchAnalytics(token) {
            fetch('http://127.0.0.1:5000/api/analytics', {
                headers: { 'Authorization': token }
            })
            .then(res => {
                if (!res.ok) throw new Error("Unauthorized");
                return res.json();
            })
            .then(data => {
                // 1. Populate KPI Cards
                document.getElementById('statRevenue').innerText = '$' + data.total_revenue.toFixed(2);
                document.getElementById('statOrders').innerText = data.total_orders;
                document.getElementById('statUsers').innerText = data.total_users;

                // 2. Render Bar Chart (Top Books)
                const barCtx = document.getElementById('barChart').getContext('2d');
                new Chart(barCtx, {
                    type: 'bar',
                    data: {
                        labels: data.top_books.map(b => b.name.substring(0, 20) + '...'), // Truncate long names
                        datasets: [{
                            label: 'Copies Sold',
                            data: data.top_books.map(b => b.sales),
                            backgroundColor: '#0070ba',
                            borderRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
                    }
                });

                // 3. Render Doughnut Chart (Categories)
                const doughnutCtx = document.getElementById('doughnutChart').getContext('2d');
                new Chart(doughnutCtx, {
                    type: 'doughnut',
                    data: {
                        labels: data.category_sales.map(c => c.category),
                        datasets: [{
                            data: data.category_sales.map(c => c.sales),
                            backgroundColor: ['#ff6384', '#36a2eb', '#ffce56', '#4bc0c0', '#9966ff', '#ff9f40'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { position: 'bottom' } }
                    }
                });
            })
            .catch(err => {
                console.error(err);
                document.querySelector('.admin-container').innerHTML = "<h2 style='color:red;'>Access Denied. Please log in as an administrator.</h2>";
            });
        }
    </script>
</body>
</html>
