<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MyStore</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .admin-container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        
        /* Tabs */
        .tab-container { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #666; font-weight: bold; }
        .tab-btn.active { color: #0070ba; border-bottom: 3px solid #0070ba; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Stats & Charts */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid #0070ba; }
        .stat-card h3 { margin: 0; color: #666; font-size: 1rem; text-transform: uppercase; }
        .stat-card .value { font-size: 2.5rem; font-weight: bold; color: #111; margin: 10px 0 0 0; }
        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .chart-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        /* Inventory Table */
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #232f3e; color: white; }
        .action-btn { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .edit-btn { background-color: #ffc107; color: #000; }
        .delete-btn { background-color: #dc3545; color: white; margin-left: 5px; }

        /* Edit Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 400px; max-width: 90%; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body style="background-color: #f4f7f6;">

    <header>
        <div class="header-left">
            <a href="index.html" class="logo">📚 MyStore</a>
            <nav class="nav-links">
                <a href="admin.html" style="color: #ffd814";>Admin</a>
                <a href="orders.html">Orders History</a>
            </nav>
            
        </div>
    </header>

    <div class="admin-container">
        
        <div class="tab-container">
            <button class="tab-btn active" onclick="switchTab('analytics')">📊 Analytics</button>
            <button class="tab-btn" onclick="switchTab('inventory')">📦 Inventory</button>
        </div>

        <div id="analytics" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card"><h3>Total Revenue</h3><p class="value" id="statRevenue">$0.00</p></div>
                <div class="stat-card" style="border-left-color: #ffc107;"><h3>Total Orders</h3><p class="value" id="statOrders">0</p></div>
                <div class="stat-card" style="border-left-color: #28a745;"><h3>Registered Users</h3><p class="value" id="statUsers">0</p></div>
            </div>
            <div class="charts-grid">
                <div class="chart-container"><h3>Top 5 Selling Books</h3><canvas id="barChart"></canvas></div>
                <div class="chart-container"><h3>Sales by Category</h3><canvas id="doughnutChart"></canvas></div>
            </div>
        </div>

        <div id="inventory" class="tab-content">
            
            <div class="admin-form-panel">
                <h3 id="formTitle" style="margin-top: 0; color: #232f3e;">➕ Add New Book</h3>
                <input type="hidden" id="editBookId">
                
                <div class="form-grid">
                    <div style="grid-column: span 1;">
                        <label style="font-size: 0.85rem; color: #555;">Book Name</label>
                        <input type="text" id="editName" class="admin-input" placeholder="e.g. Python Crash Course">
                    </div>
                    <div>
                        <label style="font-size: 0.85rem; color: #555;">Price ($)</label>
                        <input type="number" id="editPrice" step="0.01" class="admin-input" placeholder="0.00">
                    </div>
                    <div>
                        <label style="font-size: 0.85rem; color: #555;">Stock Quantity</label>
                        <input type="number" id="editStock" class="admin-input" placeholder="0">
                    </div>
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="buy-btn" id="saveBtn" style="width: auto; padding: 10px 25px;" onclick="saveBook()">Save Book</button>
                    <button class="buy-btn" id="cancelBtn" style="width: auto; padding: 10px 25px; background: #ccc; color: #333; display: none;" onclick="resetForm()">Cancel Edit</button>
                </div>
            </div>

            <h3 style="color: #232f3e; margin-bottom: 10px;">📚 Current Inventory</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Book Name</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTableBody" onload="fetchInventory()">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    
    <div id="toast"></div>
    <div id="adminLoginOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#232f3e; z-index:9999; display:flex; justify-content:center; align-items:center;">
        <div style="background:white; padding:40px; border-radius:12px; text-align:center; width: 350px;">
            <h2 style="margin-top:0; color:#111;">🔒 Admin Access</h2>
            <p style="color:#666; font-size:0.9rem; margin-bottom:20px;">Please authenticate to view the dashboard.</p>
            <input type="text" id="adminUsername" placeholder="Admin Username" style="width:100%; margin-bottom:15px; padding:10px; border:1px solid #ccc; border-radius:4px;">
            <input type="password" id="adminPass" placeholder="Admin Password" style="width:100%; margin-bottom:20px; padding:10px; border:1px solid #ccc; border-radius:4px;">
            <button class="buy-btn" style="width:100%; margin-bottom: 15px;" onclick="adminLogin()">Login to Dashboard</button>
            <a href="index.html" style="color:#0070ba; text-decoration:none; font-size:0.9rem;">← Return to Store</a>
        </div>
    </div>
    <script src="js/admin.js"></script>
</body>

</html>
